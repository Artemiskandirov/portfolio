/* =============== NAME =============== */
function wrapLetters(text, baseDelay = 0) {
  const out = []; let li = 0;
  for (const ch of text) {
    if (ch === ' ') out.push(' ');
    else { out.push(`<span class="letter" style="animation-delay:${baseDelay + li * 0.04}s">${ch}</span>`); li++; }
  }
  return out.join('');
}
function buildName() {
  const el = document.getElementById('ovName');
  if (!el) return;
  let nameStr = 'Artem Iskandirov.';
  if (DATA && DATA.themes && DATA.themes[currentTheme] && DATA.themes[currentTheme].name) {
    nameStr = DATA.themes[currentTheme].name;
    if (!/[.!?]$/.test(nameStr)) nameStr += '.';
  }
  const words = nameStr.split(' ');
  el.innerHTML = words.map((w, i) => `<span class="word">${wrapLetters(w, i * 0.2)}</span>`).join(' ');
}

/* =============== THIEF =============== */
let thiefBusy = false;
function getStealableLetters() {
  const cs = [];
  document.querySelectorAll('.tab-view.active .ov-name .letter').forEach(el => {
    if (el.classList.contains('stolen')) return;
    const r = el.getBoundingClientRect();
    if (r.width === 0 || r.height === 0) return;
    if (r.top < 60 || r.top > window.innerHeight - 120) return;
    cs.push(el);
  });
  return cs;
}
function sendThief(letter) {
  if (thiefBusy || !letter || letter.classList.contains('stolen')) return;
  thiefBusy = true;
  const r = letter.getBoundingClientRect();
  const lx = r.left + r.width/2, ly = r.top + r.height/2;
  const dL = lx, dR = window.innerWidth - lx, dT = ly, dB = window.innerHeight - ly;
  const closest = Math.min(dL, dR, dT, dB);
  const cs = 72;
  let fromX, fromY, scaleX = 1;
  if (closest === dL) { fromX = -cs; fromY = ly + r.height/2 - 18; }
  else if (closest === dR) { fromX = window.innerWidth + cs; fromY = ly + r.height/2 - 18; scaleX = -1; }
  else if (closest === dT) { fromX = lx - cs/2; fromY = -cs; }
  else { fromX = lx - cs/2; fromY = window.innerHeight + cs; }
  let nx = lx - cs/2, ny = ly - cs * 0.6;
  if (closest === dT) ny = ly - cs + 4;
  if (closest === dB) ny = ly + 4;

  const cat = document.createElement('div');
  cat.className = 'pixel-thief';
  cat.innerHTML = makeRandomCreatureSVG();
  cat.style.left = fromX + 'px';
  cat.style.top = fromY + 'px';
  cat.style.transform = `scaleX(${scaleX})`;
  cat.style.transition = 'opacity 0.3s, left 1.4s cubic-bezier(0.4,0,0.6,1), top 1.4s cubic-bezier(0.4,0,0.6,1)';
  cat.style.opacity = '0';
  document.body.appendChild(cat);
  requestAnimationFrame(() => { cat.style.opacity = '1'; });
  if (Math.random() < 0.4) { if (currentTheme === 'fantasy') sfx.swordSwing(); else sfx.chirp(); }
  setTimeout(() => { cat.style.left = nx + 'px'; cat.style.top = ny + 'px'; }, 60);
  setTimeout(() => {
    cat.style.transition = 'opacity 0.3s, transform 0.18s cubic-bezier(0.34,1.4,0.64,1), left 0.18s, top 0.18s';
    cat.style.transform = `scaleX(${scaleX}) translateY(-6px)`;
    if (currentTheme === 'fantasy') sfx.flameWhoosh(); else sfx.swat();
    letter.classList.add('stolen');
  }, 1550);
  setTimeout(() => { cat.style.transform = `scaleX(${scaleX}) translateY(0)`; }, 1750);
  setTimeout(() => {
    if (currentTheme === 'fantasy') { if (Math.random() < 0.5) sfx.dragonRoar(); }
    else if (Math.random() < 0.5) sfx.meow2();
    cat.style.transition = 'opacity 0.4s, left 1.2s cubic-bezier(0.4,0,0.6,1), top 1.2s cubic-bezier(0.4,0,0.6,1)';
    cat.style.left = fromX + 'px'; cat.style.top = fromY + 'px';
  }, 2150);
  setTimeout(() => { cat.style.opacity = '0'; }, 3100);
  setTimeout(() => { cat.remove(); thiefBusy = false; }, 3500);
  setTimeout(() => letter.classList.remove('stolen'), 7000);
}
function maybeSteal() {
  if (TABS[activeIdx] !== 'overview') return;
  const c = getStealableLetters();
  if (!c.length) return;
  sendThief(c[Math.floor(Math.random()*c.length)]);
}
function scheduleThief() {
  setTimeout(() => { if (!document.hidden) maybeSteal(); scheduleThief(); }, 22000 + Math.random()*22000);
}

/* =============== EDGE CAT =============== */
const edgeCat = document.createElement('div');
edgeCat.className = 'pixel-edge-cat';
document.body.appendChild(edgeCat);
let edgeActive = false, edgeTimer = null, lastSwipeAt = 0;
function showEdgeCat(side, y) {
  if (edgeActive) return;
  edgeActive = true;
  edgeCat.innerHTML = makeRandomCreatureSVG();
  const cs = 90;
  let yy = Math.max(80, Math.min(window.innerHeight - cs - 100, y - cs / 2));
  edgeCat.style.top = yy + 'px';
  if (side === 'left') {
    edgeCat.style.left = '-' + cs + 'px'; edgeCat.style.right = 'auto';
    edgeCat.style.transform = 'translateX(0) scaleX(1)';
    requestAnimationFrame(() => { edgeCat.classList.add('show'); edgeCat.style.transform = 'translateX(' + (cs * 0.85) + 'px) scaleX(1)'; });
  } else {
    edgeCat.style.right = '-' + cs + 'px'; edgeCat.style.left = 'auto';
    edgeCat.style.transform = 'translateX(0) scaleX(-1)';
    requestAnimationFrame(() => { edgeCat.classList.add('show'); edgeCat.style.transform = 'translateX(-' + (cs * 0.85) + 'px) scaleX(-1)'; });
  }
  if (currentTheme === 'fantasy') {
    sfx.randomFantasySound();
  } else {
    if (Math.random() < 0.4) sfx.chirp();
    else if (Math.random() < 0.7) sfx.meow2();
    else sfx.trill();
  }
  clearTimeout(edgeTimer);
  edgeTimer = setTimeout(hideEdgeCat, 2400);
}
function hideEdgeCat() {
  edgeCat.classList.remove('show');
  const isLeft = edgeCat.style.left !== 'auto' && edgeCat.style.left !== '';
  const cs = 90;
  if (isLeft) edgeCat.style.transform = 'translateX(-' + cs + 'px) scaleX(1)';
  else edgeCat.style.transform = 'translateX(' + cs + 'px) scaleX(-1)';
  setTimeout(() => { edgeActive = false; }, 600);
}
document.addEventListener('mousemove', e => {
  if (window.innerWidth < 769) return;
  const x = e.clientX, y = e.clientY;
  if (!edgeActive) {
    if (x < 8 && Date.now() - lastSwipeAt > 4500) { showEdgeCat('left', y); lastSwipeAt = Date.now(); }
    else if (x > window.innerWidth - 8 && Date.now() - lastSwipeAt > 4500) { showEdgeCat('right', y); lastSwipeAt = Date.now(); }
  } else {
    const isLeft = edgeCat.style.left !== 'auto' && edgeCat.style.left !== '';
    if ((isLeft && x > 140) || (!isLeft && x < window.innerWidth - 140)) {
      clearTimeout(edgeTimer);
      edgeTimer = setTimeout(hideEdgeCat, 200);
    }
  }
});

function stateLabel(s) { return getStateLabel(s); }
function escHtml(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmtNarrative(s) {
  // wrap **...** in <strong class="acc">…</strong>, escape rest
  if (!s) return '';
  const parts = s.split(/\*\*([^*]+)\*\*/);
  return parts.map((p, i) => i % 2 === 1 ? `<strong class="acc">${escHtml(p)}</strong>` : escHtml(p)).join('');
}

const TABS = ['overview', 'experience', 'projects', 'education', 'social'];
const dock = document.getElementById('dock');
const indicator = document.getElementById('dockIndicator');
const curEl = document.getElementById('cur');
let activeIdx = 0;

function goTo(i, fromUser = true) {
  if (i < 0) i = TABS.length - 1;
  if (i >= TABS.length) i = 0;
  if (i === activeIdx && fromUser) return;
  document.querySelectorAll('.tab-view').forEach(v => {
    const isActive = v.dataset.tab === TABS[i];
    v.classList.toggle('active', isActive);
    if (isActive) v.scrollTop = 0;
  });
  const target = document.querySelector(`.tab-view[data-tab="${TABS[i]}"]`);
  if (target) {
    target.querySelectorAll('.exp-row, .pcard, .soc-row').forEach(r => {
      r.style.animation = 'none'; void r.offsetHeight; r.style.animation = '';
    });
  }
  const tabs = [...dock.querySelectorAll('.dock-tab')];
  tabs.forEach((t, idx) => t.classList.toggle('active', idx === i));
  positionIndicator(tabs[i]);
  curEl.textContent = String(i + 1).padStart(2, '0');
  curEl.classList.remove('bump'); void curEl.offsetHeight; curEl.classList.add('bump');
  activeIdx = i;
  if (fromUser) sfx.switch_tab(i);
}
function positionIndicator(tab) {
  if (!tab) return;
  const r = tab.getBoundingClientRect();
  const pr = dock.getBoundingClientRect();
  indicator.style.transform = `translateX(${r.left - pr.left - 5}px)`;
  indicator.style.width = `${r.width}px`;
}
dock.querySelectorAll('.dock-tab').forEach((tab, i) => {
  tab.addEventListener('click', e => {
    // ripple effect
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = tab.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top = (e.clientY - rect.top - size/2) + 'px';
    tab.appendChild(r);
    setTimeout(() => r.remove(), 700);
    goTo(i);
  });
  tab.addEventListener('mouseenter', () => sfx.hover(TABS[i]));
});
function bindSounds() {
  document.querySelectorAll('[data-sound]').forEach(el => {
    if (el._soundBound) return;
    el._soundBound = true;
    const section = el.dataset.sound;
    el.addEventListener('mouseenter', () => sfx.hover(section));
    el.addEventListener('click', () => sfx.click(section));
  });
}

const soundBtn = document.getElementById('soundToggle');
soundBtn.addEventListener('click', () => {
  const muted = soundBtn.classList.toggle('muted');
  sfx.setMuted(muted);
  if (muted) {
    sfx.purrLoopStop && sfx.purrLoopStop();
    const _cat = document.getElementById('catBedCat');
    if (_cat) _cat.classList.remove('purring');
  } else {
    sfx.click(TABS[activeIdx]);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(activeIdx + 1);
  else if (e.key === 'ArrowLeft') goTo(activeIdx - 1);
  else if (/^[1-5]$/.test(e.key)) goTo(parseInt(e.key) - 1);
});
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.4) {
    if (dx < 0) goTo(activeIdx + 1);
    else goTo(activeIdx - 1);
  }
}, { passive: true });

function isInteractive(target) {
  return target.closest('a, button, header, .dock, .splash, [data-sound], .exp-row, .pcard, .soc-row, .skills-list li, .lang-item, .ov-photo, .ov-name, .pixel-cat, .pixel-thief, .pixel-edge-cat, kbd, .hint, .counter, .game-overlay, .scene-catbed');
}
document.addEventListener('click', e => {
  if (isInteractive(e.target)) return;
  if (document.getElementById('splash') && !document.getElementById('splash').classList.contains('hide')) return;
  if (document.getElementById('gameOverlay').classList.contains('show')) return;
  spawnCreature(e.clientX, e.clientY);
});

const splash = document.getElementById('splash');
document.getElementById('splashEnter').addEventListener('click', async () => {
  sfx.init(); sfx.resume(); sfx.enter();
  splash.classList.add('hide');
  // Make sure DATA exists. If load is still pending, race it against a 1.5s timeout.
  // If it never resolves (404, 401, offline) — use the embedded FALLBACK_DATA so the site always renders.
  if (!DATA) {
    try {
      await Promise.race([
        loadData(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 1500))
      ]);
    } catch (e) {
      console.warn('using fallback data:', e);
      DATA = FALLBACK_DATA;
    }
  }
  if (!DATA) DATA = FALLBACK_DATA;
  try { renderAll(); } catch (e) { console.error('renderAll failed:', e); }
  try { buildName(); } catch (e) { console.error('buildName failed:', e); }
  setTimeout(() => {
    try {
      goTo(0, false);
      requestAnimationFrame(() => positionIndicator(dock.querySelectorAll('.dock-tab')[0]));
      scheduleThief();
      buildTrees(); buildKnight(); buildFireflies(); buildBat();
      buildSleepingCat();
      startZLoop();
      bindCatBed();
      startIdleLoop();
      bindKnight();
      startKnightIdle();
      requestAnimationFrame(tickFire);
      setTimeout(shootingStarLoop, 6000);
      setTimeout(batLoop, 12000);
    } catch (e) { console.error('init failed:', e); }
  }, 200);
});

/* =============== THEME SWITCH =============== */
const themeBtn = document.getElementById('themeBtn');
const musicBtn = document.getElementById('musicToggle');
themeBtn.addEventListener('click', () => {
  if (!sfx.ctx) { sfx.init(); sfx.resume(); }
  currentTheme = currentTheme === 'cat' ? 'fantasy' : 'cat';
  document.body.classList.toggle('theme-fantasy', currentTheme === 'fantasy');
  document.body.classList.toggle('theme-cat', currentTheme === 'cat');
  renderOverviewContent();
  setTimeout(() => positionIndicator(dock.querySelectorAll('.dock-tab')[activeIdx]), 100);
  // auto-start fantasy ambient when switching to fantasy
  if (currentTheme === 'fantasy') {
    catAmbient.stop();
    fantasyAmbient.start();
    musicBtn.classList.add('playing');
    sfx._bell(220, 0.13, 0.9);
    // stop cat purring if it was active
    sfx.purrLoopStop && sfx.purrLoopStop();
    const _cat = document.getElementById('catBedCat');
    if (_cat) _cat.classList.remove('purring');
  } else {
    fantasyAmbient.stop();
    musicBtn.classList.remove('playing');
    sfx.click(TABS[activeIdx]);
  }
});

musicBtn.addEventListener('click', () => {
  if (!sfx.ctx) { sfx.init(); sfx.resume(); }
  let playing = false;
  if (currentTheme === 'fantasy') playing = fantasyAmbient.toggle();
  else playing = catAmbient.toggle();
  musicBtn.classList.toggle('playing', playing);
});

/* =============== GAME =============== */
const gameOverlay = document.getElementById('gameOverlay');
const gameBoard = document.getElementById('gameBoard');
const gameStatus = document.getElementById('gameStatus');
const gameBtn = document.getElementById('gameBtn');
const gameClose = document.getElementById('gameClose');
const gameReset = document.getElementById('gameReset');
let gameState = Array(9).fill(null);
let gameOver = false;
let playerTurn = true;
let cheated = false;

function getXSVG() {
  if (currentTheme === 'fantasy') {
    const grid = ["................","................","..........SS....",".........SSS....","........SSS.....",".......SSS......","......SSS.......",".....SSS........","....SSS.........","...HHHHH........","..HHHHHHH.......","...HHHHH........","....HH..........","................","................","................"];
    let r = '';
    for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
      const c = grid[y][x];
      if (c === 'S') r += `<rect x="${x*4}" y="${y*4}" width="4" height="4" fill="#c0c4cc"/>`;
      else if (c === 'H') r += `<rect x="${x*4}" y="${y*4}" width="4" height="4" fill="#7a4a2a"/>`;
    }
    return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${r}</svg>`;
  }
  const grid = ["................","................","..XX........XX..","..XXX......XXX..","...XXX....XXX...","....XXX..XXX....",".....XXXXXX.....","......XXXX......","......XXXX......",".....XXXXXX.....","....XXX..XXX....","...XXX....XXX...","..XXX......XXX..","..XX........XX..","................","................"];
  let r = '';
  for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
    if (grid[y][x] === 'X') r += `<rect x="${x*4}" y="${y*4}" width="4" height="4" fill="#1a1a18"/>`;
  }
  return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${r}</svg>`;
}
function getOSVG() {
  if (currentTheme === 'fantasy') return makePixelSVG(FANTASY_POSES[2], FANTASY_PALETTES[2]);
  return makePixelSVG(CAT_POSES[0], CAT_PALETTES[Math.floor(Math.random()*CAT_PALETTES.length)]);
}

function buildBoard() {
  gameBoard.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('button');
    cell.className = 'game-cell';
    cell.dataset.idx = i;
    cell.addEventListener('click', () => onCellClick(i));
    gameBoard.appendChild(cell);
  }
}
function renderBoard(highlightWin) {
  [...gameBoard.children].forEach((cell, i) => {
    cell.disabled = !!gameState[i] || gameOver || !playerTurn;
    if (gameState[i] === 'X') cell.innerHTML = getXSVG();
    else if (gameState[i] === 'O') cell.innerHTML = getOSVG();
    else cell.innerHTML = '';
    cell.classList.toggle('win', highlightWin && highlightWin.includes(i));
  });
}
const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function checkWinner(state) {
  for (const line of WIN_LINES) {
    const [a,b,c] = line;
    if (state[a] && state[a] === state[b] && state[a] === state[c]) return { winner: state[a], line };
  }
  if (state.every(Boolean)) return { winner: 'draw', line: [] };
  return null;
}
function onCellClick(i) {
  if (gameOver || !playerTurn || gameState[i]) return;
  gameState[i] = 'X';
  if (currentTheme === 'fantasy') sfx.swordSwing();
  else sfx.click('projects');
  renderBoard();
  let res = checkWinner(gameState);
  if (res) return endGame(res);
  playerTurn = false;
  setTimeout(opponentTurn, 500 + Math.random() * 400);
}
function opponentTurn() {
  if (gameOver) return;
  const empty = [];
  gameState.forEach((v, i) => { if (!v) empty.push(i); });
  if (!empty.length) return;
  const xCount = gameState.filter(v => v === 'X').length;
  if (!cheated && xCount >= 2 && Math.random() < 0.25) {
    const xs = []; gameState.forEach((v, i) => { if (v === 'X') xs.push(i); });
    const target = xs[Math.floor(Math.random() * xs.length)];
    gameState[target] = 'O';
    cheated = true;
    const cell = gameBoard.children[target];
    cell.classList.add('cheat');
    setTimeout(() => cell.classList.remove('cheat'), 500);
    if (currentTheme === 'fantasy') sfx.dragonRoar(); else sfx.meow5();
    gameStatus.innerHTML = CONTENT[currentTheme].statusCheat;
    renderBoard();
    let res = checkWinner(gameState);
    if (res) return endGame(res);
    playerTurn = true;
    renderBoard();
    return;
  }
  let move = findMove('O') ?? findMove('X') ?? pickStrat(empty);
  gameState[move] = 'O';
  if (currentTheme === 'fantasy') sfx.flameWhoosh(); else sfx.meow2();
  gameStatus.textContent = CONTENT[currentTheme].yourMove;
  renderBoard();
  let res = checkWinner(gameState);
  if (res) return endGame(res);
  playerTurn = true;
  renderBoard();
}
function findMove(mark) {
  for (const line of WIN_LINES) {
    const [a,b,c] = line;
    const vals = [gameState[a], gameState[b], gameState[c]];
    const marks = vals.filter(v => v === mark).length;
    const empties = vals.filter(v => v === null).length;
    if (marks === 2 && empties === 1) {
      if (gameState[a] === null) return a;
      if (gameState[b] === null) return b;
      if (gameState[c] === null) return c;
    }
  }
  return null;
}
function pickStrat(empty) {
  const priority = [4, 0, 2, 6, 8, 1, 3, 5, 7];
  for (const i of priority) if (empty.includes(i)) return i;
  return empty[0];
}
function endGame(res) {
  gameOver = true;
  const c = CONTENT[currentTheme];
  if (res.winner === 'X') { gameStatus.innerHTML = c.statusYouWin; sfx.win(); }
  else if (res.winner === 'O') { gameStatus.innerHTML = c.statusCatWin; sfx.lose(); }
  else { gameStatus.innerHTML = c.statusDraw; sfx.draw(); }
  renderBoard(res.line);
}
function resetGame() {
  gameState = Array(9).fill(null);
  gameOver = false; playerTurn = true; cheated = false;
  gameStatus.textContent = CONTENT[currentTheme].yourMove;
  renderBoard();
}
function openGame() {
  resetGame();
  switchGameTab('ttt');
  gameOverlay.classList.add('show');
  if (!sfx.ctx) { sfx.init(); sfx.resume(); }
  if (currentTheme === 'fantasy') sfx.swordSwing();
  else sfx.click('projects');
}
function closeGame() {
  gameOverlay.classList.remove('show');
  catchStop();
}
gameBtn.addEventListener('click', openGame);
gameClose.addEventListener('click', closeGame);
gameReset.addEventListener('click', () => { resetGame(); sfx.click('projects'); });
gameOverlay.addEventListener('click', e => { if (e.target === gameOverlay) closeGame(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && gameOverlay.classList.contains('show')) closeGame();
});

/* === GAME TABS === */
function switchGameTab(name) {
  document.querySelectorAll('.game-tab').forEach(t => t.classList.toggle('active', t.dataset.game === name));
  document.getElementById('paneTTT').classList.toggle('active', name === 'ttt');
  document.getElementById('paneCatch').classList.toggle('active', name === 'catch');
  if (name === 'ttt') {
    document.getElementById('gameTitleEl').textContent = currentTheme === 'fantasy' ? CONTENT.fantasy.gameTitle : CONTENT.cat.gameTitle;
    document.getElementById('gameSubEl').textContent = currentTheme === 'fantasy' ? CONTENT.fantasy.gameSub : CONTENT.cat.gameSub;
  } else {
    document.getElementById('gameTitleEl').textContent = (CONTENT[currentTheme] && CONTENT[currentTheme].catchTitle) || (currentTheme === 'fantasy' ? 'Catch the dragon' : 'Catch the cat');
    document.getElementById('gameSubEl').textContent = (CONTENT[currentTheme] && CONTENT[currentTheme].catchSub) || '30 seconds — tap as many as you can';
  }
  if (name !== 'catch') catchStop();
}
document.querySelectorAll('.game-tab').forEach(t => {
  t.addEventListener('click', () => {
    switchGameTab(t.dataset.game);
    sfx.click('projects');
  });
});

/* === CATCH THE CAT GAME === */
const catchBoard = document.getElementById('catchBoard');
const catchScoreEl = document.getElementById('catchScore');
const catchBestEl = document.getElementById('catchBest');
const catchTimeEl = document.getElementById('catchTime');
const catchStartBtn = document.getElementById('catchStart');
let catchScore = 0, catchBest = 0, catchTime = 30;
let catchTimer = null, catchSpawnTimer = null, catchActive = false;

function catchSpawnCreature() {
  if (!catchActive || !catchBoard) return;
  const c = document.createElement('div');
  c.className = 'catch-creature';
  c.innerHTML = makeRandomCreatureSVG();
  const rect = catchBoard.getBoundingClientRect();
  const x = Math.random() * (rect.width - 56);
  const y = Math.random() * (rect.height - 56);
  c.style.left = x + 'px';
  c.style.top = y + 'px';
  // small random rotation for life
  const rot = (Math.random() - 0.5) * 12;
  c.style.transform = `rotate(${rot}deg)`;
  c.addEventListener('click', e => {
    e.stopPropagation();
    if (c.classList.contains('popped')) return;
    c.classList.add('popped');
    catchScore += 1;
    catchScoreEl.textContent = catchScore;
    // points burst
    const burst = document.createElement('div');
    burst.className = 'catch-points-burst';
    burst.textContent = '+1';
    burst.style.left = (x + 28) + 'px';
    burst.style.top = (y + 8) + 'px';
    catchBoard.appendChild(burst);
    setTimeout(() => burst.remove(), 900);
    // sound
    if (currentTheme === 'fantasy') sfx.randomFantasySound();
    else sfx.randomCatSound();
    setTimeout(() => c.remove(), 480);
  });
  catchBoard.appendChild(c);
  // auto-disappear if not clicked
  const lifetime = 1400 + Math.random() * 800;
  setTimeout(() => {
    if (c.parentNode && !c.classList.contains('popped')) {
      c.style.transition = 'opacity 0.4s';
      c.style.opacity = '0';
      setTimeout(() => c.remove(), 420);
    }
  }, lifetime);
}

function catchStart() {
  if (catchActive) return;
  catchActive = true;
  catchScore = 0;
  catchTime = 30;
  catchScoreEl.textContent = '0';
  catchTimeEl.textContent = '30';
  catchBoard.innerHTML = '';
  catchStartBtn.textContent = 'Stop';
  // ramping spawn rate — easier at start, harder as time goes
  let spawnInterval = 700;
  const spawnTick = () => {
    if (!catchActive) return;
    catchSpawnCreature();
    if (Math.random() < 0.35) catchSpawnCreature(); // sometimes burst
    // ramp up over time
    spawnInterval = Math.max(280, 700 - (30 - catchTime) * 14);
    catchSpawnTimer = setTimeout(spawnTick, spawnInterval);
  };
  spawnTick();
  // 1-second timer
  catchTimer = setInterval(() => {
    catchTime -= 1;
    catchTimeEl.textContent = String(catchTime);
    if (catchTime <= 0) catchEnd();
  }, 1000);
  // first spawn sound
  if (currentTheme === 'fantasy') sfx.fanfareCall();
  else sfx.trill();
}

function catchEnd() {
  catchActive = false;
  if (catchTimer) clearInterval(catchTimer);
  if (catchSpawnTimer) clearTimeout(catchSpawnTimer);
  if (catchScore > catchBest) {
    catchBest = catchScore;
    catchBestEl.textContent = catchBest;
  }
  catchStartBtn.textContent = 'Play again';
  // win sound + heart shower
  sfx.win();
  // celebrate by popping any remaining creatures
  catchBoard.querySelectorAll('.catch-creature:not(.popped)').forEach(el => el.classList.add('popped'));
  setTimeout(() => {
    if (!catchActive) catchBoard.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;font-family:var(--font-display);color:var(--fg)"><div style="font-size:36px;font-weight:700">${catchScore}</div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg-mid)">caught</div></div>`;
  }, 500);
}

function catchStop() {
  if (!catchActive) return;
  catchActive = false;
  if (catchTimer) clearInterval(catchTimer);
  if (catchSpawnTimer) clearTimeout(catchSpawnTimer);
  catchStartBtn.textContent = 'Start round';
}

if (catchStartBtn) {
  catchStartBtn.addEventListener('click', () => {
    if (catchActive) {
      catchStop();
      catchBoard.innerHTML = '';
      catchStartBtn.textContent = 'Start round';
    } else {
      catchStart();
    }
  });
}

loadData().catch(e => console.warn(e));

/* =============== INIT =============== */
buildBoard();
buildName();
renderOverviewContent();
renderProjects();
bindSounds();
window.addEventListener('resize', () => positionIndicator(dock.querySelectorAll('.dock-tab')[activeIdx]));
window.addEventListener('load', () => setTimeout(() => positionIndicator(dock.querySelectorAll('.dock-tab')[0]), 60));
</script>
</body>
</html>
